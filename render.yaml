services:
  - type: web
    name: smartagri-backend
    runtime: node
    buildCommand: rm -rf backend/node_modules frontend/node_modules && cd frontend && npm ci && npm run build && cd ../backend && npm ci
    startCommand: cd backend && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: JWT_SECRET
        generateValue: true
